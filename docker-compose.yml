services:
  # 1. El Servicio de Base de Datos
  mongodb:
    image: mongo:7.0.4
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db  # <--- ¡Aquí salvamos los datos!

  investory-db:
    image: mysql:8
    container_name: inventory-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory-db
    volumes:
      - inventory_data:/var/lib/mysql


  order-db:
    image: postgres:16-alpine
    container_name: order-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: order-db
    volumes:
      - order_data:/var/lib/postgresql/data

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak-db
    volumes:
      - keycloak_data:/var/lib/postgresql/data

  # 2. Keycloak Service
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev # Modo desarrollo (rápido y sin HTTPS obligatorio)
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak-db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      # Credenciales del Super Admin (Para entrar a la consola ya mismo)
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db


volumes:
  mongo_data:
  inventory_data:
  order_data:
  keycloak_data:


